<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23050505'/><text x='16' y='23' text-anchor='middle' font-family='monospace' font-size='20' fill='%23c8c8c8'>A</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background-color: #111114; color: #9a9a9f;
      font-family: 'JetBrains Mono', monospace; text-align: center;
    }
    .wrap { padding: 20px; }
    h1 { font-size: 48px; font-weight: 500; color: #b8b8be; letter-spacing: 0.1em; margin-bottom: 16px; }
    p { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 32px; }
    a {
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: #5e5e65; text-decoration: none;
      border: 1px solid #2a2a2e; padding: 6px 14px;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    a:hover { border-color: #5e5e65; color: #9a9a9f; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>Page not found</p>
    <a href="/">Return to resume</a>
  </div>
</body>
</html>
